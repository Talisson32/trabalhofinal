<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle do LED</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f0f0f0;
    }
    h1 { color: #333; }
    button {
      font-size: 18px;
      padding: 15px 40px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #on {
      background: #2ecc71;
      color: white;
    }
    #on:hover { background: #27ae60; }
    
    #off {
      background: #e74c3c;
      color: white;
    }
    #off:hover { background: #c0392b; }
    
    #status {
      font-size: 20px;
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      display: inline-block;
      min-width: 200px;
    }
  </style>
</head>
<body>
  <h1>⚡ Controle do LED</h1>
  <button id="on">Ligar</button>
  <button id="off">Desligar</button>
  <div id="status">Estado: carregando...</div>

  <script>
    // URL do Firebase (com .json no final)
    const firebaseURL = "https://trabalho-6549f-default-rtdb.firebaseio.com/led.json";

    // Função para ler o estado
    function lerEstado() {
      fetch(firebaseURL)
        .then(response => response.json())
        .then(data => {
          console.log("Valor do Firebase:", data);
          const texto = data ? "🟢 Ligado" : "🔴 Desligado";
          document.getElementById('status').innerText = "Estado: " + texto;
        })
        .catch(error => {
          console.error("Erro ao ler:", error);
          document.getElementById('status').innerText = "Estado: Erro ao conectar";
        });
    }

    // Função para escrever no Firebase
    function escreverFirebase(valor) {
      fetch(firebaseURL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(valor)
      })
      .then(response => response.json())
      .then(data => {
        console.log("Escrito no Firebase:", data);
        lerEstado(); // atualiza o estado na tela
      })
      .catch(error => {
        console.error("Erro ao escrever:", error);
      });
    }

    // Botão Ligar
    document.getElementById('on').onclick = () => {
      console.log("Clicou em LIGAR");
      escreverFirebase(true);
    };

    // Botão Desligar
    document.getElementById('off').onclick = () => {
      console.log("Clicou em DESLIGAR");
      escreverFirebase(false);
    };

    // Lê o estado inicial
    lerEstado();

    // Atualiza a cada 2 segundos
    setInterval(lerEstado, 2000);
  </script>
</body>
</html>
