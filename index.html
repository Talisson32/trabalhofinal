<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle do LED</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f0f0f0;
    }
    h1 { color: #333; }
    button {
      font-size: 18px;
      padding: 15px 40px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #on {
      background: #2ecc71;
      color: white;
    }
    #on:hover { background: #27ae60; }
    
    #off {
      background: #e74c3c;
      color: white;
    }
    #off:hover { background: #c0392b; }
    
    #status {
      font-size: 20px;
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      display: inline-block;
      min-width: 200px;
    }
  </style>
</head>
<body>
  <h1>⚡ Controle do LED 8</h1>
  <button id="on">Ligar</button>
  <button id="off">Desligar</button>
  <div id="status">Estado: carregando...</div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

  <script>
    // Configuração do Firebase
    const firebaseConfig = {
      databaseURL: "https://trabalho-6549f-default-rtdb.firebaseio.com"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const ledRef = database.ref('led');

    // Atualizar status em tempo real
    ledRef.on('value', (snapshot) => {
      const estado = snapshot.val();
      const texto = estado ? "🟢 Ligado" : "🔴 Desligado";
      document.getElementById('status').innerText = "Estado: " + texto;
    });

    // Botão Ligar
    document.getElementById('on').onclick = () => {
      ledRef.set(true);
    };

    // Botão Desligar
    document.getElementById('off').onclick = () => {
      ledRef.set(false);
    };
  </script>
</body>
</html>
