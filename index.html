<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle do LED</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f0f0f0;
    }
    h1 { color: #333; }
    button {
      font-size: 18px;
      padding: 15px 40px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #on {
      background: #2ecc71;
      color: white;
    }
    #on:hover { background: #27ae60; }
    
    #off {
      background: #e74c3c;
      color: white;
    }
    #off:hover { background: #c0392b; }
    
    #status {
      font-size: 20px;
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      display: inline-block;
      min-width: 200px;
    }
  </style>
</head>
<body>
  <h1>⚡ Controle do LED</h1>
  <button id="on">Ligar</button>
  <button id="off">Desligar</button>
  <div id="status">Estado: carregando...</div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx_Zh3pSRRhnKq7c4KFF0iJMmBSkEsLzMSsVpPdqrIXpu0woGcw0YNJvMoRE1op1I-l/exec";

    function atualizarStatus() {
      const script = document.createElement('script');
      script.src = API_URL + '?callback=processResponse';
      document.head.appendChild(script);
    }

    window.processResponse = function(data) {
      document.getElementById('status').innerText = 
        "Estado: " + (data.led ? "🟢 Ligado" : "🔴 Desligado");
    };

    document.getElementById('on').onclick = () => {
      const script = document.createElement('script');
      script.src = API_URL + '?action=on&callback=processResponse';
      script.onload = () => {
        setTimeout(atualizarStatus, 500);
      };
      document.head.appendChild(script);
    };

    document.getElementById('off').onclick = () => {
      const script = document.createElement('script');
      script.src = API_URL + '?action=off&callback=processResponse';
      script.onload = () => {
        setTimeout(atualizarStatus, 500);
      };
      document.head.appendChild(script);
    };

    // Atualiza o status a cada 3 segundos
    atualizarStatus();
    setInterval(atualizarStatus, 3000);
  </script>
</body>
</html>
