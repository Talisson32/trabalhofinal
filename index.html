<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>LED Control</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { padding: 20px 40px; font-size: 16px; margin: 10px; cursor: pointer; }
    #on { background: green; color: white; }
    #off { background: red; color: white; }
    #status { font-size: 18px; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Controle LED</h1>
  <button id="on">LIGAR</button>
  <button id="off">DESLIGAR</button>
  <p id="status">Estado: carregando...</p>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzTwpM2tjfMPTgX-BSORmJDAHVCzexulpintU7xKx7D7YY5XtogYi1y-2RTc0bHyka5/exec";
    
    function mostrarStatus(data) {
      const texto = data.led ? "🟢 LIGADO" : "🔴 DESLIGADO";
      document.getElementById('status').innerText = "Estado: " + texto;
    }

    function ler() {
      const s = document.createElement('script');
      s.src = API + "?callback=mostrarStatus";
      document.body.appendChild(s);
    }

    document.getElementById('on').onclick = function() {
      const s = document.createElement('script');
      s.src = API + "?action=on&callback=mostrarStatus";
      document.body.appendChild(s);
      setTimeout(ler, 500);
    };

    document.getElementById('off').onclick = function() {
      const s = document.createElement('script');
      s.src = API + "?action=off&callback=mostrarStatus";
      document.body.appendChild(s);
      setTimeout(ler, 500);
    };

    ler();
    setInterval(ler, 3000);
  </script>
</body>
</html>
